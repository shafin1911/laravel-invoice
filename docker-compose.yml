services:
  app:
    build: .
    container_name: invoice_app
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - invoice_net

  nginx:
    image: nginx:alpine
    container_name: invoice_nginx
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - invoice_net

  db:
    image: postgres:15-alpine
    container_name: invoice_db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - invoice_net
    volumes:
      - pgdata:/var/lib/postgresql/data

networks:
  invoice_net:
    driver: bridge

volumes:
  pgdata:
